syntax = "proto3";

package messages.normalizers;

// Because can be used as decoder
option csharp_namespace = "Tokenizers.HuggingFace.Decoders";
option java_package = "io.github.ignaciodelatorrearias.HuggingFace.Tokenizers.Decoders";

message Replace{
  // requiere
  oneof pattern{
    string string_replacement = 1;
    string regex_replacement = 3;
  }
  string content = 2;
}