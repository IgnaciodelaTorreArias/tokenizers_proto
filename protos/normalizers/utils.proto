syntax = "proto3";

package messages.normalizers;

option csharp_namespace = "Tokenizers.HuggingFace.Internal.Normalizers";
option java_package = "io.github.ignaciodelatorrearias.HuggingFace.Tokenizers.Internal.Normalizers";

message StripAccents{}

message StripNormalizer{
  bool strip_left = 1;
  bool strip_right = 2;
}

message Lowercase{}

message Prepend{
  string prepend = 1;
}