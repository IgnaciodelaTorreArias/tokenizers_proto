syntax = "proto3";

package messages.decoders;

option csharp_namespace = "Tokenizers.HuggingFace.Decoders";
option java_package = "io.github.ignaciodelatorrearias.huggingface.tokenizers.decoders";

// ByteFallback is a simple trick which converts tokens looking like `<0x61>`
// to pure bytes, and attempts to make them into a string. If the tokens
// cannot be decoded you will get � instead for each inconvertible byte token
message ByteFallback {}